<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur uang kita - Pengelolaan Keuangan</title>
    <!-- Library untuk PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            color: var(--primary);
            font-size: 28px;
        }

        .form-section {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-group {
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .input-group h3 {
            margin-top: 0;
            font-size: 16px;
            color: var(--secondary);
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-add {
            background-color: var(--secondary);
            color: white;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-add:hover { background-color: #219150; }

        .recap-section {
            margin-top: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        table th { background-color: #f8f9fa; }

        .total-box {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn-download {
            background-color: #e67e22;
            color: white;
            padding: 12px 25px;
            display: block;
            margin: 0 auto;
            font-weight: bold;
        }

        .btn-download:hover { background-color: #d35400; }

        .delete-btn {
            color: #e74c3c;
            background: none;
            font-size: 12px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Atur uang kita</h1>
    </header>

    <!-- Input Form -->
    <div class="form-section">
        <div class="input-group">
            <h3>Input Pengeluaran Baru</h3>
            
            <label for="category">Pilih Menu / Kategori:</label>
            <select id="category">
                <option value="Suami/Istri">Suami / Istri</option>
                <option value="Keperluan Rumah">Keperluan Rumah</option>
                <option value="Keperluan Tak Terduga">Keperluan Tak Terduga</option>
            </select>

            <label for="amount">Nominal (Rupiah):</label>
            <input type="number" id="amount" placeholder="Contoh: 50000">

            <label for="note">Keterangan:</label>
            <textarea id="note" rows="2" placeholder="Beli apa?"></textarea>

            <button class="btn-add" onclick="addExpense()">Simpan Pengeluaran</button>
        </div>
    </div>

    <!-- Rekapan Section -->
    <div class="recap-section">
        <h2>Rekapan 30 Hari Terakhir</h2>
        <table id="expenseTable">
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Kategori</th>
                    <th>Keterangan</th>
                    <th>Nominal</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="expenseBody">
                <!-- Data akan masuk di sini -->
            </tbody>
        </table>

        <div class="total-box">
            Total Pengeluaran: <span id="totalAmount">Rp 0</span>
        </div>

        <button class="btn-download" onclick="downloadPDF()">Download Rekap (PDF)</button>
    </div>
</div>

<script>
    // Inisialisasi Data dari LocalStorage
    let expenses = JSON.parse(localStorage.getItem('aturUangKita')) || [];

    function addExpense() {
        const category = document.getElementById('category').value;
        const amount = document.getElementById('amount').value;
        const note = document.getElementById('note').value;
        const date = new Date().toLocaleDateString('id-ID');

        if (!amount || amount <= 0) {
            alert("Harap masukkan nominal yang valid!");
            return;
        }

        const newExpense = {
            id: Date.now(),
            date: date,
            category: category,
            amount: parseInt(amount),
            note: note || '-'
        };

        expenses.push(newExpense);
        saveData();
        renderData();
        
        // Reset form
        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
    }

    function saveData() {
        localStorage.setItem('aturUangKita', JSON.stringify(expenses));
    }

    function deleteExpense(id) {
        expenses = expenses.filter(exp => exp.id !== id);
        saveData();
        renderData();
    }

    function renderData() {
        const tbody = document.getElementById('expenseBody');
        const totalSpan = document.getElementById('totalAmount');
        tbody.innerHTML = '';
        let total = 0;

        // Tampilkan data (biasanya dibatasi 30 entri terakhir atau berdasarkan tanggal)
        expenses.slice().reverse().forEach(exp => {
            const row = `<tr>
                <td>${exp.date}</td>
                <td>${exp.category}</td>
                <td>${exp.note}</td>
                <td>Rp ${exp.amount.toLocaleString('id-ID')}</td>
                <td><button class="delete-btn" onclick="deleteExpense(${exp.id})">Hapus</button></td>
            </tr>`;
            tbody.innerHTML += row;
            total += exp.amount;
        });

        totalSpan.innerText = `Rp ${total.toLocaleString('id-ID')}`;
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Judul PDF
        doc.setFontSize(18);
        doc.text("Laporan Keuangan: Atur uang kita", 14, 20);
        
        doc.setFontSize(12);
        doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 30);

        // Header Tabel PDF
        const headers = [["Tanggal", "Kategori", "Keterangan", "Nominal"]];
        
        // Isi Tabel PDF
        const data = expenses.map(exp => [
            exp.date,
            exp.category,
            exp.note,
            `Rp ${exp.amount.toLocaleString('id-ID')}`
        ]);

        // Generate Tabel
        doc.autoTable({
            startY: 40,
            head: headers,
            body: data,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] }
        });

        // Hitung Total
        const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
        const finalY = doc.lastAutoTable.finalY || 40;
        
        doc.setFontSize(14);
        doc.text(`Total Pengeluaran: Rp ${total.toLocaleString('id-ID')}`, 14, finalY + 15);

        // Simpan File
        doc.save("Rekap_Atur_Uang_Kita.pdf");
    }

    // Jalankan render saat pertama kali buka
    renderData();
</script>

</body>
</html>
